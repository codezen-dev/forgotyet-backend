server:
  port: 8078

spring:
  profiles:
    active: dev
  servlet:
    multipart:
      enabled: true
      max-file-size: 2MB     # 单个音频最大2MB（对应压缩后的60秒）
      max-request-size: 2MB  # 总请求也不允许超过2MB
  datasource:
    url: jdbc:h2:file:./data/forgotyet;DB_CLOSE_DELAY=-1;AUTO_SERVER=TRUE
    driver-class-name: org.h2.Driver
    username: sa
    password:
  jpa:
    database-platform: org.hibernate.dialect.H2Dialect
    hibernate:
      ddl-auto: update
  h2:
    console:
      enabled: true
  mail:
    host: smtp.163.com
    port: 465
    username: 13241888142@163.com
    #forgotyet.official@gmail.com
    password: ${MAIL_PASSWORD}
    default-encoding: UTF-8
    properties:
      mail:
        smtp:
          auth: true
          ssl:
            enable: true # 163 必须开启 SSL
            required: true
          connectiontimeout: 5000 # 国内极其稳定，5秒足够了
          timeout: 5000
          writetimeout: 5000

# LLM 多模型高可用配置
llm:
  # 主模型：DeepSeek (聪明，便宜，但最近容易被挤爆)
  primary:
    base-url: https://api.deepseek.com/chat/completions
    api-key: ${DEEPSEEK_KEY}
    model: deepseek-chat
  # 备模型：阿里云通义千问 (OpenAI兼容接口，极稳)
  backup:
    base-url: https://dashscope.aliyuncs.com/compatible-mode/v1/chat/completions
    api-key: ${ALIYUN_KEY}
    model: qwen-plus
voice:
  # 🚀 换成硅基流动的标准 OpenAI 接口 (国内极速直连)
  api-url: https://api.siliconflow.cn/v1/audio/transcriptions
  api-key: sk-你的硅基流动新Key
  # 🚀 可以用 whisper，也可以用阿里开源的最强中文语音模型 SenseVoice
  model: FunAudioLLM/SenseVoiceSmall
  # (或者填 model: openai/whisper-large-v3)
aliyun:
  pnvs:
    accessKeyId: ${ALIYUN_PNVS_AK}
    accessKeySecret: ${ALIYUN_PNVS_SK}
    endpoint: dypnsapi.aliyuncs.com
    regionId: cn-hangzhou
    templateCode: 100001
    # schemeName 可空；但“发送/校验”要一致
    schemeName:
    countryCode: 86
    templateMin: 5
